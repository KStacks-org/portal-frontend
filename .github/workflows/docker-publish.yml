name: Build and Push to GHCR

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to the Container registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=master-,format=short,enable={{is_default_branch}}
            type=sha,prefix=pr-,format=short,enable=${{ github.event_name == 'pull_request' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-infra:
    name: Update image tag in infra repo
    needs: build-and-push
    # Only run on direct pushes to master (not PRs, not tags)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: KStacks-org/infra
          token: ${{ secrets.INFRA_PAT }}
          path: infra

      - name: Update auth-service image tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          NEW_IMAGE="ghcr.io/kstacks-org/portal-frontend:master-${SHORT_SHA}"
          FILE="infra/portal-frontend/deployment.yaml"

          yq -i ".spec.template.spec.containers[0].image = \"${NEW_IMAGE}\"" "$FILE"

          echo "Updated image to: ${NEW_IMAGE}"
          yq '.spec.template.spec.containers[0].image' "$FILE"

      - name: Commit and push changes
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          cd infra
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portal-frontend/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(portal-frontend): bump image to master-${SHORT_SHA}"
          git push
